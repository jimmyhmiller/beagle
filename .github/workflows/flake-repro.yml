name: flake-repro

# Bisect the OSR-gated chain-corruption SIGSEGV on Linux-x86 + compacting.
# A/B established: OSR-off = clean, OSR-on = crashes. These steps split
# OSR-on into its component effects; the first crashing step localizes it:
#   osr-codegen-only : OsrCheck emitted, counter decrements, trampoline NEVER
#                      fires (threshold too high)   -> crash = back-edge codegen
#   osr-one-trip     : trampoline fires once per loop (build request + gate),
#                      never re-trips (recheck huge) -> crash = trampoline/build
#   osr-full         : normal defaults               -> control (known to crash)
# Temporary — delete once the flake is fixed.

on:
  push:
    branches: [gcrust-gc-http-scaling]
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: full
      BEAGLE_CRASH_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: nproc
      - name: Build (compacting, backend-x86-64)
        run: cargo build --release --features compacting,backend-x86-64
      - name: osr-codegen-only (threshold huge; trampoline never fires)
        run: |
          T=stress/gc_chain_hammer.bg
          for round in $(seq 1 30); do
            pids=""; rm -f /tmp/rc_*
            for c in $(seq 1 8); do
              ( BEAGLE_OSR_THRESHOLD=2000000000 ./target/release/beag test $T > /tmp/out_$c.log 2>&1; echo $? > /tmp/rc_$c ) &
              pids="$pids $!"
            done
            wait $pids
            for c in $(seq 1 8); do
              if [ "$(cat /tmp/rc_$c 2>/dev/null)" != "0" ]; then
                echo "### CODEGEN-ONLY CRASH: round $round copy $c ###"; cat /tmp/out_$c.log; exit 1
              fi
            done
            echo "codegen-only round $round: clean"
          done
          echo "codegen-only clean"
      - name: osr-one-trip (build fires once per loop; no re-trips)
        if: always()
        run: |
          T=stress/gc_chain_hammer.bg
          for round in $(seq 1 30); do
            pids=""; rm -f /tmp/rc_*
            for c in $(seq 1 8); do
              ( BEAGLE_OSR_RECHECK=2000000000 ./target/release/beag test $T > /tmp/out_$c.log 2>&1; echo $? > /tmp/rc_$c ) &
              pids="$pids $!"
            done
            wait $pids
            for c in $(seq 1 8); do
              if [ "$(cat /tmp/rc_$c 2>/dev/null)" != "0" ]; then
                echo "### ONE-TRIP CRASH: round $round copy $c ###"; cat /tmp/out_$c.log; exit 1
              fi
            done
            echo "one-trip round $round: clean"
          done
          echo "one-trip clean"
      - name: osr-full (control — known to crash eventually)
        if: always()
        run: |
          T=stress/gc_chain_hammer.bg
          for round in $(seq 1 30); do
            pids=""; rm -f /tmp/rc_*
            for c in $(seq 1 8); do
              ( ./target/release/beag test $T > /tmp/out_$c.log 2>&1; echo $? > /tmp/rc_$c ) &
              pids="$pids $!"
            done
            wait $pids
            for c in $(seq 1 8); do
              if [ "$(cat /tmp/rc_$c 2>/dev/null)" != "0" ]; then
                echo "### FULL-OSR CRASH: round $round copy $c ###"; cat /tmp/out_$c.log; exit 1
              fi
            done
            echo "full round $round: clean"
          done
          echo "full clean (crash is rare — rerun if all steps green)"
