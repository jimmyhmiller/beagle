name: flake-repro

# Reproduce the intermittent SIGSEGV in concurrent_card_table_barrier_test on
# the Linux-x86 + compacting config (the only failing matrix cell), with the
# crash-backtrace handler enabled so we capture WHERE it crashes instead of
# "process produced no output". Temporary — delete once the flake is fixed.

on:
  push:
    branches: [gcrust-gc-http-scaling]
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (compacting, backend-x86-64)
        run: cargo build --release --features compacting,backend-x86-64
      - name: Loop the flaky test until it crashes (backtrace on)
        run: |
          for i in $(seq 1 150); do
            echo "=== iteration $i ==="
            RUST_BACKTRACE=full BEAGLE_CRASH_BACKTRACE=1 \
              ./target/release/beag test resources/concurrent_card_table_barrier_test.bg 2>&1 \
              || { echo "### FAILED/CRASHED on iteration $i (exit $?) ###"; exit 1; }
          done
          echo "no crash in 150 iterations"
