name: Run Cargo Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64 configurations
          - os: ubuntu-latest
            gc-features: "generational"
            backend: "backend-x86-64"
            build-mode: "debug"
          - os: ubuntu-latest
            gc-features: "generational"
            backend: "backend-x86-64"
            build-mode: "release"
          - os: ubuntu-latest
            gc-features: "compacting"
            backend: "backend-x86-64"
            build-mode: "debug"
          - os: ubuntu-latest
            gc-features: "compacting"
            backend: "backend-x86-64"
            build-mode: "release"
          - os: ubuntu-latest
            gc-features: "mark-and-sweep"
            backend: "backend-x86-64"
            build-mode: "debug"
          - os: ubuntu-latest
            gc-features: "mark-and-sweep"
            backend: "backend-x86-64"
            build-mode: "release"
          # macOS ARM64 configurations
          - os: macos-latest
            gc-features: "generational"
            backend: "backend-arm64"
            build-mode: "debug"
          - os: macos-latest
            gc-features: "generational"
            backend: "backend-arm64"
            build-mode: "release"
          - os: macos-latest
            gc-features: "compacting"
            backend: "backend-arm64"
            build-mode: "debug"
          - os: macos-latest
            gc-features: "compacting"
            backend: "backend-arm64"
            build-mode: "release"
          - os: macos-latest
            gc-features: "mark-and-sweep"
            backend: "backend-arm64"
            build-mode: "debug"
          - os: macos-latest
            gc-features: "mark-and-sweep"
            backend: "backend-arm64"
            build-mode: "release"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests with features (${{ matrix.build-mode }})
        run: |
          if [ "${{ matrix.build-mode }}" = "release" ]; then
            BEAGLE_DEBUG_INVOKE=1 BEAGLE_TRACE=test RUST_BACKTRACE=1 cargo test --features ${{ matrix.gc-features }},${{ matrix.backend }},trace --release -- --test-threads=1
          else
            BEAGLE_DEBUG_INVOKE=1 BEAGLE_TRACE=test RUST_BACKTRACE=1 cargo test --features ${{ matrix.gc-features }},${{ matrix.backend }},trace -- --test-threads=1
          fi

      - name: Run Beagle test suite
        if: always()
        run: |
          if [ "${{ matrix.build-mode }}" = "release" ]; then
            cargo run --features ${{ matrix.gc-features }},${{ matrix.backend }} --release -- test --ctrf ctrf-report.json resources/
          else
            cargo run --features ${{ matrix.gc-features }},${{ matrix.backend }} -- test --ctrf ctrf-report.json resources/
          fi

      - name: Publish test results
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: ctrf-report.json
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
